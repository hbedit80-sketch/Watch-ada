<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0b0b; color: #ffffff; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; background-color: #0b0b0b; display: flex; flex-direction: column; }

        .header-section {
            background-color: #006699; 
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            padding: 30px 20px 60px 20px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }

        .coin-display {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px; border-radius: 50px;
            font-size: 16px; font-weight: 600; color: #ffd700;
            margin-bottom: 10px; border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .currency-selector {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 15px; border-radius: 20px; font-size: 13px;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .balance-text { font-size: 34px; font-weight: bold; margin-top: 5px; }
        .sub-text { font-size: 12px; opacity: 0.7; margin-top: -5px; }

        .withdraw-btn {
            width: 90%; background-color: #2196f3; color: white; border: none;
            padding: 15px; border-radius: 12px; font-size: 18px; font-weight: 600;
            cursor: pointer; margin-top: -25px; box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
            z-index: 10; align-self: center; text-align: center; text-decoration: none;
        }

        .menu-container { margin: 40px 20px; background-color: #1a1a1a; border-radius: 15px; border: 1px solid #222; }
        .menu-item { display: flex; align-items: center; padding: 18px 20px; cursor: pointer; border-bottom: 1px solid #2a2a2a; }
        .menu-item i { width: 30px; font-size: 20px; color: #2196f3; margin-right: 15px; }
        .menu-item span { font-size: 16px; }

        .swal2-popup { background: #1a1a1a !important; color: #fff !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <div class="coin-display">
                <i class="fa-solid fa-coins"></i> <span id="coinDisplay">0</span> Coins
            </div>

            <div class="currency-selector" onclick="openCurrencyPicker()">
                <span id="selectedCurrencyName">Nepalese Rupee</span> <i class="fa-solid fa-caret-down"></i>
            </div>

            <div class="balance-text" id="balanceDisplay">Loading...</div>
            <div class="sub-text">Estimated Earnings</div>
        </div>

        <button class="withdraw-btn" onclick="goToWithdraw()">Withdraw</button>

        <div class="menu-container">
            <div class="menu-item" onclick="window.location.href='profile.html'"><i class="fa-solid fa-user"></i><span>Profile</span></div>
            <div class="menu-item" onclick="window.location.href='earn.html'"><i class="fa-solid fa-circle-dollar-to-slot"></i><span>Earn</span></div>
            <div class="menu-item" onclick="window.location.href='task.html'"><i class="fa-solid fa-list-check"></i><span>Task</span></div>
            <div class="menu-item" onclick="window.location.href='watch_ads.html'"><i class="fa-solid fa-circle-play"></i><span>Watch Ads</span></div>
            <div class="menu-item" onclick="window.location.href='guide.html'"><i class="fa-solid fa-book-bookmark"></i><span>Guide</span></div>
            <div class="menu-item" onclick="window.location.href='history.html'"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></div>
            <div class="menu-item" onclick="window.location.href='setting.html'"><i class="fa-solid fa-gear"></i><span>Settings</span></div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ryklvvbhfrlrwqxswydh.supabase.co";
        const SB_KEY = "sb_publishable_MCd04uSNUXad3nPvy28dug_85fvcUwj"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let totalCoins = 0; 
        let currentCurrencyCode = "NPR"; // Default currency set to NPR

        // SAFE RATE: 400 Coins = 1 NPR
        const coinToNprRate = 0.0025; 

        const currencies = {
            "NPR": { name: "Nepalese Rupee", symbol: "Rs", rate: 1 },
            "INR": { name: "Indian Rupee", symbol: "₹", rate: 0.62 },
            "USD": { name: "US Dollar", symbol: "$", rate: 0.0075 },
            "GBP": { name: "British Pound", symbol: "£", rate: 0.0060 },
            "EUR": { name: "Euro", symbol: "€", rate: 0.0070 },
            "AED": { name: "UAE Dirham", symbol: "DH", rate: 0.027 },
            "MYR": { name: "Malaysian Ringgit", symbol: "RM", rate: 0.035 },
            "USDT": { name: "USDT (Crypto)", symbol: "₮", rate: 0.0075 }
        };

        async function fetchUserData() {
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (!session) {
                    window.location.href = "auth.html"; 
                    return;
                }

                const user = session.user;
                const { data } = await _supabase
                    .from('profiles')
                    .select('balance')
                    .eq('id', user.id)
                    .maybeSingle();

                totalCoins = data ? (data.balance || 0) : 0;
                
                document.getElementById('coinDisplay').innerText = totalCoins.toLocaleString();
                updateBalance(currentCurrencyCode);

            } catch (err) {
                console.error("Error:", err);
                document.getElementById('balanceDisplay').innerText = "Error";
            }
        }

        function openCurrencyPicker() {
            let options = {};
            for (let code in currencies) {
                options[code] = currencies[code].name;
            }

            Swal.fire({
                title: 'Select Currency',
                input: 'select',
                inputOptions: options,
                inputPlaceholder: 'Choose country',
                showCancelButton: true,
                confirmButtonColor: '#2196f3',
            }).then((result) => {
                if (result.value) {
                    currentCurrencyCode = result.value;
                    updateBalance(result.value);
                }
            });
        }

        function updateBalance(code) {
            const currency = currencies[code];
            // Step 1: Coins to NPR
            const amountInNpr = totalCoins * coinToNprRate;
            // Step 2: NPR to selected currency
            const finalAmount = (amountInNpr * currency.rate).toFixed(2);

            document.getElementById('selectedCurrencyName').innerText = currency.name;
            document.getElementById('balanceDisplay').innerText = `${currency.symbol} ${finalAmount}`;
        }

        function goToWithdraw() {
            window.location.href = "withdraw.html";
        }

        window.onload = fetchUserData;
    </script>
</body>
</html>
