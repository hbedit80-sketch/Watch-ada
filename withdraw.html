<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Withdraw Funds</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0b0b; color: #ffffff; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; padding: 0 20px 30px 20px; display: flex; flex-direction: column; }
        .header { display: flex; align-items: center; padding: 20px 0; margin-bottom: 20px; }
        .back-btn { color: #ffffff; font-size: 18px; text-decoration: none; width: 30px; }
        .header h2 { flex: 1; font-size: 20px; font-weight: 500; text-align: center; margin-right: 30px; }
        .balance-card { background: linear-gradient(135deg, #006699, #2196f3); padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 25px; }
        .balance-label { font-size: 14px; opacity: 0.9; }
        .balance-amount { font-size: 30px; font-weight: bold; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: #888; margin-bottom: 8px; margin-left: 5px; }
        .input-wrapper { background-color: #1a1a1a; border-radius: 12px; border: 1px solid #222; display: flex; align-items: center; padding: 0 15px; }
        .input-wrapper i { color: #2196f3; width: 25px; }
        .input-wrapper input, .input-wrapper select { background: transparent; border: none; color: #fff; padding: 15px 10px; width: 100%; font-size: 16px; outline: none; }
        select option { background: #1a1a1a; }
        .withdraw-btn { background-color: #2196f3; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(33, 150, 243, 0.3); }
        .withdraw-btn:disabled { background-color: #555; cursor: not-allowed; }
        .swal2-popup { background: #1a1a1a !important; color: #fff !important; border-radius: 15px !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2>Withdraw</h2>
        </div>

        <div class="balance-card">
            <div class="balance-label">Available Balance</div>
            <div class="balance-amount" id="balanceText">Loading...</div>
        </div>

        <div class="form-group">
            <label>Select Country</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-globe"></i>
                <select id="countrySelect" onchange="updateMethods()">
                    <option value="">Choose Country</option>
                    <option value="NP">Nepal</option>
                    <option value="IN">India</option>
                    <option value="US">USA / Global</option>
                    <option value="AE">UAE</option>
                    <option value="Crypto">Crypto (USDT)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Withdrawal Method</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-wallet"></i>
                <select id="methodSelect">
                    <option value="">Select country first</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Wallet Number / ID</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-address-card"></i>
                <input type="text" id="walletId" placeholder="Enter number or ID">
            </div>
        </div>

        <div class="form-group">
            <label>Withdraw Amount (£)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-money-bill-transfer"></i>
                <input type="number" id="amount" placeholder="0.00" step="0.01">
            </div>
        </div>

        <button class="withdraw-btn" id="submitBtn" onclick="processWithdraw()">Submit Request</button>
    </div>

    <script>
        // १. सुपाबेस कन्फिग
        const SB_URL = "https://ryklvvbhfrlrwqxswydh.supabase.co";
        const SB_KEY = "sb_publishable_MCd04uSNUXad3nPvy28dug_85fvcUwj";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let userCoins = 0;
        let userPounds = 0;
        let currentUser = null;

        const methods = {
            "NP": ["eSewa", "Khalti", "IME Pay", "Bank Transfer"],
            "IN": ["UPI (PhonePe/GPay)", "Paytm", "Bank Transfer"],
            "US": ["PayPal", "CashApp"],
            "AE": ["Botim Pay", "Bank Transfer"],
            "Crypto": ["USDT (TRC20)", "Binance ID"]
        };

        // २. ब्यालेन्स लोड गर्ने
        async function loadBalance() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }
            currentUser = user;

            const { data } = await _supabase
                .from('profiles')
                .select('balance')
                .eq('id', user.id)
                .maybeSingle();

            userCoins = data ? (data.balance || 0) : 0;
            // १००० Coins = १ Pound (£) हिसाबले
            userPounds = (userCoins / 1000).toFixed(2);
            document.getElementById('balanceText').innerText = `${userPounds} £`;
        }

        function updateMethods() {
            const country = document.getElementById('countrySelect').value;
            const methodDropdown = document.getElementById('methodSelect');
            methodDropdown.innerHTML = '';
            if (country && methods[country]) {
                methods[country].forEach(m => {
                    let opt = document.createElement('option');
                    opt.value = m; opt.innerHTML = m;
                    methodDropdown.appendChild(opt);
                });
            } else {
                methodDropdown.innerHTML = '<option>Select country first</option>';
            }
        }

        // ३. विथड्र प्रोसेस (Database मा सेभ गर्ने)
        async function processWithdraw() {
            const wallet = document.getElementById('walletId').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const country = document.getElementById('countrySelect').value;
            const method = document.getElementById('methodSelect').value;
            const btn = document.getElementById('submitBtn');

            if (!wallet || !amount || !country || !method) {
                Swal.fire({ icon: 'error', title: 'Empty Fields', text: 'सबै विवरण भर्नुहोस्!', background: '#1a1a1a', color: '#fff' });
                return;
            }

            if (amount > userPounds) {
                Swal.fire({ icon: 'error', title: 'Insufficient Balance', text: 'तपाईंसँग पर्याप्त ब्यालेन्स छैन!', background: '#1a1a1a', color: '#fff' });
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";

            // सुपाबेसको 'withdrawals' टेबलमा रिक्वेस्ट पठाउने
            const { error } = await _supabase
                .from('withdrawals')
                .insert([{
                    user_id: currentUser.id,
                    amount: amount,
                    method: `${country} - ${method}`,
                    wallet_id: wallet,
                    status: 'pending',
                    created_at: new Date()
                }]);

            if (error) {
                Swal.fire({ icon: 'error', title: 'Failed', text: error.message });
                btn.disabled = false;
                btn.innerText = "Submit Request";
            } else {
                Swal.fire({ icon: 'success', title: 'Requested!', text: 'तपाईंको विथड्र रिक्वेस्ट एडमिनलाई पठाइयो।', confirmButtonColor: '#2196f3' })
                .then(() => { window.location.href = "index.html"; });
            }
        }

        window.onload = loadBalance;
    </script>
</body>
</html>
