<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0b0b; color: #ffffff; display: flex; justify-content: center; min-height: 100vh; }
        
        .container { 
            width: 100%; max-width: 450px; 
            background-color: #0b0b0b; 
            display: flex; flex-direction: column; 
            min-height: 100vh;
            padding-bottom: 30px; /* तल अलिकति ठाउँ छोडिएको */
        }

        .header { 
            display: flex; align-items: center; 
            padding: 15px 20px; background-color: #0b0b0b; 
            border-bottom: 1px solid #1a1a1a; 
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn { color: #ffffff; font-size: 20px; text-decoration: none; cursor: pointer; width: 40px; }
        .header h2 { flex: 1; font-size: 20px; font-weight: 500; text-align: center; margin-right: 40px; }

        .profile-form { padding: 25px 20px; display: flex; flex-direction: column; gap: 20px; flex-grow: 1; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-group label { color: #888; font-size: 14px; margin-left: 5px; }
        
        .input-group input { 
            background-color: #1a1a1a; border: 1px solid #2a2a2a; 
            color: #ffffff; padding: 16px; border-radius: 12px; 
            font-size: 16px; outline: none; width: 100%; 
            transition: border-color 0.3s;
        }

        .input-group input:focus { border-color: #2196f3; }
        .input-group input:disabled { color: #666; background-color: #0d0d0d; border-color: #111; }

        .save-btn { 
            background-color: #2196f3; color: white; border: none; 
            padding: 16px; border-radius: 12px; font-size: 18px; 
            font-weight: 600; cursor: pointer; 
            margin: 20px; /* बटनलाई अलि माथि सारिएको */
            transition: 0.3s;
        }

        .save-btn:active { transform: scale(0.98); }
        .save-btn:disabled { background-color: #555; cursor: not-allowed; }

        .swal2-popup { background: #1a1a1a !important; color: #fff !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h2>Profile Settings</h2>
        </div>

        <div class="profile-form">
            <div class="input-group">
                <label><i class="fa-solid fa-user"></i> Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-envelope"></i> Email (Cannot change)</label>
                <input type="email" id="email" disabled>
            </div>
        </div>

        <button class="save-btn" id="saveBtn" onclick="saveData()">Save Changes</button>
    </div>

    <script>
        // १. सुपाबेस कन्फिगरेसन
        const SB_URL = "https://ryklvvbhfrlrwqxswydh.supabase.co";
        const SB_KEY = "sb_publishable_MCd04uSNUXad3nPvy28dug_85fvcUwj";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;

        // २. युजरको प्रोफाइल डाटा लोड गर्ने
        async function loadProfile() {
            const { data: { user }, error: authError } = await _supabase.auth.getUser();

            if (!user) {
                window.location.href = "login.html"; // लगइन छैन भने पठाउने
                return;
            }

            currentUser = user;
            document.getElementById('email').value = user.email;

            // profiles टेबलबाट नाम खोज्ने
            const { data, error } = await _supabase
                .from('profiles')
                .select('full_name')
                .eq('id', user.id)
                .maybeSingle();

            if (data && data.full_name) {
                document.getElementById('fullName').value = data.full_name;
            }
        }

        // ३. डाटा सेभ गर्ने
        async function saveData() {
            const btn = document.getElementById('saveBtn');
            const newName = document.getElementById('fullName').value.trim();

            if (!newName) {
                Swal.fire('Error', 'Please enter your name', 'error');
                return;
            }

            btn.innerText = "Updating...";
            btn.disabled = true;

            // profiles टेबलमा डाटा अपडेट वा इन्सर्ट गर्ने
            const { error } = await _supabase
                .from('profiles')
                .upsert({ 
                    id: currentUser.id, 
                    full_name: newName,
                    updated_at: new Date()
                });

            if (error) {
                Swal.fire('Failed', error.message, 'error');
                btn.innerText = "Save Changes";
                btn.disabled = false;
            } else {
                Swal.fire({
                    title: 'Success!',
                    text: 'Profile updated successfully',
                    icon: 'success',
                    confirmButtonColor: '#2196f3'
                });
                
                btn.innerText = "Saved!";
                btn.style.backgroundColor = "#4caf50";
                
                setTimeout(() => {
                    btn.innerText = "Save Changes";
                    btn.style.backgroundColor = "#2196f3";
                    btn.disabled = false;
                }, 2000);
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
