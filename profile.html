<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile - HB Edit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0b0b; color: #ffffff; display: flex; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 450px; background-color: #0b0b0b; display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 30px; }

        .header { display: flex; align-items: center; padding: 15px 20px; background-color: rgba(11, 11, 11, 0.95); border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .header h2 { flex: 1; font-size: 18px; font-weight: 600; text-align: center; }

        /* Profile Section - ठूलो फोटो र स्पेस */
        .profile-top { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 20px 30px 20px; 
            background: linear-gradient(180deg, #161616 0%, #0b0b0b 100%); 
            border-bottom: 1px solid #1a1a1a; 
        }

        .avatar-container { 
            position: relative; 
            margin-bottom: 25px; 
            width: 140px; 
            height: 140px; 
        }
        
        .avatar { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid #f3ba2f; 
            box-shadow: 0 0 25px rgba(243, 186, 47, 0.3); 
        }
        
        .edit-avatar { 
            position: absolute; 
            bottom: 5px; 
            right: 5px; 
            background-color: #f3ba2f; 
            color: black; 
            width: 38px; 
            height: 38px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            border: 4px solid #0b0b0b; 
            cursor: pointer; 
        }

        /* Stats Cards */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px; }
        .stat-box { 
            background: #161616; 
            border: 1px solid #2a2a2a; 
            padding: 20px 10px; 
            border-radius: 18px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            transition: 0.3s; 
            cursor: pointer; 
        }
        .stat-box:active { transform: scale(0.95); border-color: #f3ba2f; }

        .stat-icon { font-size: 22px; margin-bottom: 8px; }
        .stat-value { font-size: 18px; font-weight: 700; color: #ffffff; margin-bottom: 2px; }
        .stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }

        .referral-icon { color: #2196f3; }
        .balance-icon { color: #f3ba2f; }
        .link-icon { color: #ff9800; }
        .download-icon { color: #e91e63; }

        /* Inputs */
        .profile-form { padding: 25px 20px; display: flex; flex-direction: column; gap: 18px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { color: #aaa; font-size: 13px; margin-left: 5px; }
        .input-group input { 
            background-color: #1a1a1a; 
            border: 1px solid #2a2a2a; 
            color: #ffffff; 
            padding: 15px; 
            border-radius: 14px; 
            font-size: 15px; 
            outline: none; 
            transition: 0.3s; 
        }
        .input-group input:focus { border-color: #f3ba2f; background-color: #222; }

        .save-btn { 
            background: #f3ba2f; 
            color: black; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            margin: 10px 20px; 
            transition: 0.3s; 
        }
        .save-btn:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2 id="displayHeader">My Account</h2>
        </div>

        <div class="profile-top">
            <div class="avatar-container">
                <img src="https://via.placeholder.com/200/333/ffffff?text=U" alt="Profile" class="avatar" id="profileAvatar">
                <label for="avatarInput" class="edit-avatar"><i class="fa-solid fa-camera"></i></label>
                <input type="file" id="avatarInput" style="display:none;" accept="image/*" onchange="uploadAvatar(this)">
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <i class="fa-solid fa-users stat-icon referral-icon"></i>
                    <span class="stat-value" id="countReferrals">0</span>
                    <span class="stat-label">Referrals</span>
                </div>
                
                <div class="stat-box">
                    <i class="fa-solid fa-coins stat-icon balance-icon"></i>
                    <span class="stat-value" id="countBalance">0</span>
                    <span class="stat-label">Balance</span>
                </div>

                <div class="stat-box" onclick="copyLink()">
                    <i class="fa-solid fa-share-nodes stat-icon link-icon"></i>
                    <span class="stat-value">Share</span>
                    <span class="stat-label">Invite Code</span>
                </div>

                <div class="stat-box" onclick="window.open('https://hbedit80-sketch.github.io/Watch-ada/', '_blank')">
                    <i class="fa-solid fa-cloud-arrow-down stat-icon download-icon"></i>
                    <span class="stat-value">App</span>
                    <span class="stat-label">Download</span>
                </div>
            </div>
        </div>

        <div class="profile-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
            </div>
            <div class="input-group">
                <label>Registered Phone</label>
                <input type="text" id="phone" value="..." disabled>
            </div>
        </div>

        <button class="save-btn" id="saveBtn" onclick="saveData()">Update Profile</button>
    </div>

    <script>
        const SB_URL = "https://ryklvvbhfrlrwqxswydh.supabase.co";
        const SB_KEY = "sb_publishable_MCd04uSNUXad3nPvy28dug_85fvcUwj"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;

        // १. डाटा लोड गर्ने
        async function loadProfile() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }
            currentUser = user;

            const { data, error } = await _supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (data) {
                document.getElementById('displayHeader').innerText = data.full_name || "My Profile";
                document.getElementById('fullName').value = data.full_name || "";
                document.getElementById('phone').value = data.phone || "";
                document.getElementById('countReferrals').innerText = data.total_refer || 0;
                document.getElementById('countBalance').innerText = data.balance || 0;
                
                if (data.avatar_url) {
                    document.getElementById('profileAvatar').src = data.avatar_url;
                }
            }
        }

        // २. नाम अपडेट गर्ने
        async function saveData() {
            const newName = document.getElementById('fullName').value;
            if(!newName) return Swal.fire('Error', 'Please enter your name', 'error');

            const btn = document.getElementById('saveBtn');
            btn.innerText = "Updating...";
            
            const { error } = await _supabase
                .from('profiles')
                .update({ full_name: newName })
                .eq('id', currentUser.id);

            if (error) {
                Swal.fire('Error', 'Update failed!', 'error');
            } else {
                Swal.fire({ title: 'Profile Updated!', icon: 'success', timer: 1500, showConfirmButton: false });
                loadProfile();
            }
            btn.innerText = "Update Profile";
        }

        // ३. नयाँ सेयर लिङ्क लजिक (Name + 5 Digit Code)
        function copyLink() {
            const fullName = document.getElementById('fullName').value || "User";
            const cleanName = fullName.replace(/\s/g, '').toLowerCase();
            const randomCode = Math.floor(10000 + Math.random() * 90000); // ५ अंकको कोड
            
            const refID = `${cleanName}${randomCode}`;
            const refLink = `https://hbedit80-sketch.github.io/Watch-ada/?ref=${refID}`;
            
            navigator.clipboard.writeText(refLink).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'Link Copied!',
                    text: `Code: ${refID}`,
                    footer: 'तपाईंको नयाँ रेफरल लिङ्क तयार छ।',
                    background: '#1a1a1a',
                    color: '#fff',
                    confirmButtonColor: '#f3ba2f'
                });
            });
        }

        // ४. फोटो प्रिभ्यु
        function uploadAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('profileAvatar').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
