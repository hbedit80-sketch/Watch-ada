<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile - HB Edit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b0b0b; color: #ffffff; display: flex; justify-content: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 450px; background-color: #0b0b0b; display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 30px; }

        .header { 
            display: flex; align-items: center; padding: 15px 20px; 
            background-color: rgba(11, 11, 11, 0.95); border-bottom: 1px solid #1a1a1a; 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); 
        }
        
        .back-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: #1a1a1a; border-radius: 12px; color: #fff; text-decoration: none;
            font-size: 18px; transition: 0.3s; border: 1px solid #2a2a2a;
        }
        .back-btn:active { transform: scale(0.9); background: #333; }

        .header h2 { flex: 1; font-size: 18px; font-weight: 600; text-align: center; margin-right: 40px; }

        .profile-top { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 20px 20px 20px; background: linear-gradient(180deg, #161616 0%, #0b0b0b 100%); 
        }

        .avatar-container { position: relative; margin-bottom: 20px; width: 110px; height: 110px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #f3ba2f; box-shadow: 0 0 20px rgba(243, 186, 47, 0.2); }
        .edit-avatar { 
            position: absolute; bottom: 5px; right: 5px; background-color: #f3ba2f; color: black; 
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 12px; border: 3px solid #0b0b0b; cursor: pointer; 
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; padding: 0 20px; margin-bottom: 20px; }
        .stat-card { 
            background: #161616; border: 1px solid #2a2a2a; padding: 12px; border-radius: 14px; 
            display: flex; flex-direction: column; align-items: center; text-align: center; transition: 0.2s; cursor: pointer;
        }
        .stat-card:active { transform: scale(0.95); }
        .stat-card i { font-size: 18px; margin-bottom: 6px; }
        .val { font-size: 16px; font-weight: 700; color: #fff; }
        .lab { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .c-coin { color: #f3ba2f; }
        .c-money { color: #4caf50; }
        .c-ref { color: #2196f3; }
        .c-share { color: #ff9800; }
        .c-dl { color: #e91e63; }

        .profile-form { padding: 10px 20px; display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { color: #888; font-size: 12px; margin-left: 5px; }
        .input-group input { background-color: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; padding: 14px; border-radius: 12px; font-size: 14px; outline: none; }
        .input-group input:disabled { opacity: 0.6; }

        .save-btn { background: #f3ba2f; color: black; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin: 20px; transition: 0.3s; }
        .save-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2 id="displayHeader">My Account</h2>
        </div>

        <div class="profile-top">
            <div class="avatar-container">
                <img src="https://via.placeholder.com/150/333/ffffff?text=U" alt="Profile" class="avatar" id="profileAvatar">
                <label for="avatarInput" class="edit-avatar"><i class="fa-solid fa-camera"></i></label>
                <input type="file" id="avatarInput" style="display:none;" accept="image/*" onchange="uploadAvatar(this)">
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-coins c-coin"></i>
                <span class="val" id="countBalance">0</span>
                <span class="lab">Total Coins</span>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-wallet c-money"></i>
                <span class="val" id="countMoney">रू 0.00</span>
                <span class="lab">Cash Balance</span>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-users c-ref"></i>
                <span class="val" id="countReferrals">0</span>
                <span class="lab">Referrals</span>
            </div>
            <div class="stat-card" onclick="copyLink()">
                <i class="fa-solid fa-share-nodes c-share"></i>
                <span class="val">Share</span>
                <span class="lab">Invite Link</span>
            </div>
            <div class="stat-card" style="grid-column: span 2;" onclick="window.open('https://hbedit80-sketch.github.io/Watch-ada/', '_blank')">
                <i class="fa-solid fa-cloud-arrow-down c-dl"></i>
                <span class="val">Download App</span>
                <span class="lab">Get Official HB Edit App</span>
            </div>
        </div>

        <div class="profile-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Your Name">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="emailDisplay" disabled>
            </div>
        </div>

        <button class="save-btn" id="saveBtn" onclick="saveData()">Update Profile</button>
    </div>

    <script>
        const SB_URL = "https://ryklvvbhfrlrwqxswydh.supabase.co";
        const SB_KEY = "sb_publishable_MCd04uSNUXad3nPvy28dug_85fvcUwj"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let currentRefCode = null;
        const exchangeRate = 1 / 400; 

        async function loadProfile() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }
            currentUser = user;

            document.getElementById('emailDisplay').value = user.email;

            const { data, error } = await _supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (data) {
                currentRefCode = data.refer_code;
                updateUI(data);
                setupRealtime();
            }
        }

        function updateUI(data) {
            const coins = data.balance || 0;
            const money = (coins * exchangeRate).toFixed(2); 

            document.getElementById('displayHeader').innerText = data.full_name || "My Profile";
            document.getElementById('fullName').value = data.full_name || "";
            document.getElementById('countReferrals').innerText = data.total_refer || 0;
            document.getElementById('countBalance').innerText = coins;
            document.getElementById('countMoney').innerText = `रू ${money}`;
            
            if (data.avatar_url) {
                document.getElementById('profileAvatar').src = data.avatar_url;
            }
        }

        // Real-time Update Logic
        function setupRealtime() {
            _supabase.removeAllChannels(); // Purge old listeners

            _supabase
                .channel('profile_updates')
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'profiles',
                    filter: `id=eq.${currentUser.id}` 
                }, payload => {
                    updateUI(payload.new);
                    
                    // Show a quick toast when balance changes
                    const Toast = Swal.mixin({
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 2500,
                        background: '#1a1a1a',
                        color: '#fff'
                    });
                    Toast.fire({
                        icon: 'success',
                        title: 'Balance Updated!'
                    });
                })
                .subscribe();
        }

        async function saveData() {
            const newName = document.getElementById('fullName').value;
            if(!newName) return Swal.fire('Error', 'Name is required', 'error');

            if(!currentRefCode) {
                const cleanName = newName.replace(/\s/g, '').toLowerCase();
                const randomCode = Math.floor(10000 + Math.random() * 90000);
                currentRefCode = `${cleanName}${randomCode}`;
            }

            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saving...";
            
            const { error } = await _supabase
                .from('profiles')
                .update({ full_name: newName, refer_code: currentRefCode })
                .eq('id', currentUser.id);

            if (error) {
                Swal.fire('Error', 'Failed to save!', 'error');
            } else {
                Swal.fire({ title: 'Saved!', icon: 'success', timer: 1000, showConfirmButton: false });
                loadProfile();
            }
            btn.innerText = "Update Profile";
        }

        function copyLink() {
            if(!currentRefCode) {
                return Swal.fire('Wait', 'Please update profile first!', 'info');
            }
            const refLink = `https://hbedit80-sketch.github.io/Watch-ada/?ref=${currentRefCode}`;
            navigator.clipboard.writeText(refLink).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'Link Copied!',
                    text: 'Refer a friend to get 50 coins!',
                    background: '#1a1a1a', color: '#fff', confirmButtonColor: '#f3ba2f'
                });
            });
        }

        function uploadAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('profileAvatar').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
