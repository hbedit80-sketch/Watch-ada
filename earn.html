<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earn Coins - 200 Ads</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #ffffff; min-height: 100vh; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background-color: #000000; display: flex; flex-direction: column; padding-bottom: 30px; }
        
        .header { display: flex; align-items: center; padding: 20px; position: sticky; top: 0; background: #000; z-index: 100; border-bottom: 1px solid #1a1a1a; }
        .back-btn { color: #ffffff; font-size: 20px; text-decoration: none; width: 40px; }
        .header h2 { flex: 1; font-size: 20px; font-weight: 600; text-align: center; margin-right: 40px; }

        .balance-card { background: linear-gradient(145deg, #1c1c1e, #0a0a0a); margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid #f3ba2f44; text-align: center; position: sticky; top: 70px; z-index: 99; }
        .amount { font-size: 30px; font-weight: 800; color: #f3ba2f; }
        .dollar-value { font-size: 14px; color: #a1a1a6; background: rgba(255, 255, 255, 0.05); padding: 4px 12px; border-radius: 20px; margin-top: 5px; display: inline-block; }

        .reward-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; }

        .reward-item { 
            background-color: #1c1c1e; 
            height: 85px;
            border-radius: 12px; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            border: 1px solid #2c2c2e; 
            transition: 0.3s; 
        }

        /* गायब हुने स्टायल */
        .reward-item.hidden { display: none; }

        .reward-item:active { transform: scale(0.9); border-color: #f3ba2f; }
        .reward-item i { font-size: 20px; color: #f3ba2f; margin-bottom: 5px; }
        .reward-item span { font-size: 10px; font-weight: bold; color: #8e8e93; text-transform: uppercase; }
        .coin-tag { font-size: 11px; color: #f3ba2f; margin-top: 2px; font-weight: 600; }

        .ad-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader { border: 4px solid #1c1c1e; border-top: 4px solid #f3ba2f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2>Watch & Earn</h2>
        </div>

        <div class="balance-card">
            <div class="amount"><i class="fa-solid fa-coins"></i> <span id="userBalance">...</span></div>
            <div class="dollar-value">≈ $<span id="dollarAmount">0.00</span></div>
            <p id="systemStatus" style="font-size: 10px; color: #f3ba2f; margin-top: 5px; opacity: 0.8;">Checking Ads...</p>
        </div>

        <div class="reward-grid" id="adGrid"></div>
    </div>

    <div id="adOverlay" class="ad-overlay">
        <div class="loader"></div>
        <p id="statusText">Opening Sponsored Ad...</p>
    </div>

    <script>
        const SB_URL = "https://ryklvvbhfrlrwqxswydh.supabase.co";
        const SB_KEY = "sb_publishable_MCd04uSNUXad3nPvy28dug_85fvcUwj"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const MONETAG_DIRECT_LINK = "https://www.profitablecpmrate.com/your-direct-link-here"; 
        const REWARD_AMOUNT = 10;
        const COOLDOWN_TIME = 60 * 60 * 1000; // १ घण्टा (Miliseconds मा)

        let currentBalance = 0; 
        let currentUser = null;

        function createAdBoxes() {
            const grid = document.getElementById('adGrid');
            grid.innerHTML = ""; // पुरानो सफा गर्ने
            
            const now = Date.now();
            const adStatus = JSON.parse(localStorage.getItem('ad_cooldowns')) || {};

            for (let i = 1; i <= 200; i++) {
                // चेक गर्ने: के यो एड अहिले कोoldown मा छ?
                if (adStatus[i] && now < adStatus[i]) {
                    continue; // १ घण्टा नसकिएसम्म यो बक्स बनाउदै नबनाउने (हराउने)
                }

                const box = document.createElement('div');
                box.className = 'reward-item';
                box.id = `ad-box-${i}`;
                box.onclick = () => startAdProcess(i);
                box.innerHTML = `
                    <i class="fa-solid fa-circle-play"></i>
                    <span>AD #${i}</span>
                    <div class="coin-tag">+${REWARD_AMOUNT}</div>
                `;
                grid.appendChild(box);
            }
            
            const remaining = grid.children.length;
            document.getElementById('systemStatus').innerText = `${remaining} Ads Available`;
        }

        async function loadProfile() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = "login.html"; return; }
            currentUser = user;

            const { data } = await _supabase
                .from('profiles')
                .select('balance')
                .eq('id', user.id)
                .maybeSingle();

            currentBalance = data ? (data.balance || 0) : 0;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('userBalance').innerText = currentBalance;
            document.getElementById('dollarAmount').innerText = (currentBalance / 1000).toFixed(3);
        }

        async function startAdProcess(id) {
            if (!currentUser) return;

            const overlay = document.getElementById('adOverlay');
            overlay.style.display = 'flex';

            window.open(MONETAG_DIRECT_LINK, '_blank');

            setTimeout(async () => {
                const newBalance = currentBalance + REWARD_AMOUNT;

                const { error } = await _supabase
                    .from('profiles')
                    .upsert({ id: currentUser.id, balance: newBalance, updated_at: new Date() });

                if (!error) {
                    currentBalance = newBalance;
                    updateDisplay();

                    // १ घण्टाको लागि स्टोर गर्ने
                    const adStatus = JSON.parse(localStorage.getItem('ad_cooldowns')) || {};
                    adStatus[id] = Date.now() + COOLDOWN_TIME;
                    localStorage.setItem('ad_cooldowns', JSON.stringify(adStatus));

                    // बक्सलाई तुरुन्तै हटाउने
                    const box = document.getElementById(`ad-box-${id}`);
                    if (box) box.remove();

                    Swal.fire({
                        title: 'Claimed!',
                        text: `AD #${id} अब १ घण्टापछि मात्र देखिनेछ।`,
                        icon: 'success',
                        timer: 2000,
                        showConfirmButton: false,
                        background: '#1a1a1a',
                        color: '#fff'
                    });
                }
                overlay.style.display = 'none';
            }, 5000); 
        }

        window.onload = () => {
            loadProfile();
            createAdBoxes();
            
            // प्रत्येक १ मिनेटमा चेक गर्ने (समय पुगेका एडहरू फिर्ता ल्याउन)
            setInterval(createAdBoxes, 60000);
        };
    </script>
</body>
</html>
