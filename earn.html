<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earn Coins UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #ffffff; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        .container { width: 100%; max-width: 450px; height: 100vh; background-color: #000000; display: flex; flex-direction: column; position: relative; }
        .header { display: flex; align-items: center; padding: 20px; }
        .back-btn { color: #ffffff; font-size: 20px; text-decoration: none; width: 40px; }
        .header h2 { flex: 1; font-size: 20px; font-weight: 600; text-align: center; margin-right: 40px; }

        /* Balance Card */
        .balance-card { background: linear-gradient(145deg, #1c1c1e, #0a0a0a); margin: 20px; padding: 25px; border-radius: 20px; border: 1px solid #f3ba2f44; box-shadow: 0 10px 30px rgba(243, 186, 47, 0.1); text-align: center; }
        .balance-label { color: #8e8e93; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .amount-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 5px; }
        .amount { font-size: 34px; font-weight: 800; color: #f3ba2f; }
        .dollar-value { font-size: 16px; color: #a1a1a6; font-weight: 500; background: rgba(255, 255, 255, 0.05); display: inline-block; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; }
        .coin-icon { color: #f3ba2f; font-size: 24px; }

        .reward-list { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        .reward-item { background-color: #1c1c1e; padding: 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid #2c2c2e; transition: all 0.3s ease; }
        .reward-item:active { transform: scale(0.96); border-color: #f3ba2f; }
        .reward-item.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; filter: grayscale(0.8); }
        .reward-info h3 { font-size: 18px; color: #ffffff; margin-bottom: 4px; }
        .reward-info p { color: #8e8e93; font-size: 13px; }
        .coin-tag { background: rgba(243, 186, 47, 0.1); color: #f3ba2f; padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 14px; border: 1px solid rgba(243, 186, 47, 0.2); }

        /* Ad Overlay */
        .ad-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader { border: 4px solid #1c1c1e; border-top: 4px solid #f3ba2f; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #adStatus { font-size: 18px; font-weight: 500; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2>Earn Money</h2>
        </div>

        <div class="balance-card">
            <p class="balance-label">Total Earnings</p>
            <div class="amount-container">
                <i class="fa-solid fa-coins coin-icon"></i>
                <span id="userBalance" class="amount">...</span>
                <span style="color: #f3ba2f; font-weight: bold; font-size: 18px;">Coins</span>
            </div>
            <div class="dollar-value">≈ $<span id="dollarAmount">0.00</span></div>
            <p id="systemStatus" style="font-size: 11px; color: #f3ba2f; opacity: 0.7;">Connecting to Supabase...</p>
        </div>

        <div class="reward-list">
            <div id="ad1" class="reward-item disabled" onclick="showAd(2, 'short')">
                <div class="reward-info"><h3>Short Ad Reward</h3><p><i class="fa-regular fa-clock"></i> 15 Seconds</p></div>
                <div class="coin-tag">+2 Coins</div>
            </div>
            <div id="ad2" class="reward-item disabled" onclick="showAd(5, 'medium')">
                <div class="reward-info"><h3>Medium Ad Reward</h3><p><i class="fa-regular fa-clock"></i> 30 Seconds</p></div>
                <div class="coin-tag">+5 Coins</div>
            </div>
            <div id="ad3" class="reward-item disabled" onclick="showAd(10, 'long')">
                <div class="reward-info"><h3>Long Ad Reward</h3><p><i class="fa-regular fa-clock"></i> 60 Seconds</p></div>
                <div class="coin-tag">+10 Coins</div>
            </div>
        </div>
    </div>

    <div id="adOverlay" class="ad-overlay">
        <div class="loader"></div>
        <p id="adStatus">Loading Reward Ad...</p>
    </div>

    <script>
        // १. सुपाबेस कन्फिगरेसन
        const SB_URL = "https://ryklvvbhfrlrwqxswydh.supabase.co";
        const SB_KEY = "sb_publishable_MCd04uSNUXad3nPvy28dug_85fvcUwj"; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentBalance = 0; 
        let currentUser = null;
        const conversionRate = 1000; // 1000 Coins = $1
        let isAdReady = false;

        // २. युजर डेटा तान्ने
        async function fetchBalance() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            currentUser = user;

            const { data, error } = await _supabase
                .from('profiles')
                .select('balance')
                .eq('id', user.id)
                .maybeSingle();

            if (data) {
                currentBalance = data.balance || 0;
            } else {
                currentBalance = 0;
            }

            updateUI();
            enableAds();
        }

        function enableAds() {
            isAdReady = true;
            document.getElementById('systemStatus').innerText = "Ads Ready to Watch ✅";
            document.querySelectorAll('.reward-item').forEach(ad => ad.classList.remove('disabled'));
        }

        function updateUI() {
            document.getElementById('userBalance').innerText = currentBalance;
            const dollar = (currentBalance / conversionRate).toFixed(3);
            document.getElementById('dollarAmount').innerText = dollar;
        }

        // ३. विज्ञापन देखाउने र कोइन्स अपडेट गर्ने
        async function showAd(rewardAmount, type) {
            if (!isAdReady || !currentUser) return;

            const overlay = document.getElementById('adOverlay');
            const status = document.getElementById('adStatus');
            
            overlay.style.display = 'flex';
            status.innerText = "Watching " + type + " ad...";
            status.style.color = "#fff";

            // नक्कली विज्ञापन समय (३ सेकेन्ड)
            setTimeout(async () => {
                const newBalance = currentBalance + rewardAmount;

                // सुपाबेसमा अपडेट गर्ने
                const { error } = await _supabase
                    .from('profiles')
                    .upsert({ id: currentUser.id, balance: newBalance });

                if (error) {
                    status.innerText = "Error updating balance!";
                    status.style.color = "#ff4444";
                } else {
                    currentBalance = newBalance;
                    updateUI();
                    status.innerText = "Success! +" + rewardAmount + " Coins Added";
                    status.style.color = "#4caf50";
                }

                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 1500);
            }, 3000); 
        }

        window.onload = fetchBalance;
    </script>
</body>
</html>
