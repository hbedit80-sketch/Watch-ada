<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            padding: 0 20px 30px 20px;
            position: relative;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 10px;
        }

        .back-btn {
            color: #ffffff;
            font-size: 18px;
            text-decoration: none;
            width: 30px;
            cursor: pointer;
        }

        .header h2 {
            flex: 1;
            font-size: 20px;
            font-weight: 500;
            text-align: center;
            margin-right: 30px;
        }

        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }

        .setting-item {
            background-color: #1a1a1a;
            padding: 18px 20px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .setting-item:active { background-color: #252525; }

        .left-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .setting-item i { font-size: 18px; width: 20px; text-align: center; }
        .setting-item span { font-size: 16px; font-weight: 500; }
        .arrow-right { font-size: 14px; color: #888; }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #6c4ab6; }
        input:checked + .slider:before { transform: translateX(20px); }

        .logout-text { color: #ff4d4d; }

        .delete-container { margin-top: 50px; }

        .delete-btn {
            width: 100%;
            padding: 16px;
            background-color: transparent;
            border: 1px solid #ff4d4d33;
            color: #ff4d4d;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:active { background-color: #ff4d4d11; }

        /* Custom SweetAlert Styling to match your UI */
        .swal2-popup {
            background-color: #1a1a1a !important;
            color: #ffffff !important;
            border-radius: 15px !important;
        }
        .swal2-title, .swal2-html-container { color: #ffffff !important; }
        .swal2-confirm { background-color: #6c4ab6 !important; border-radius: 8px !important; }
        .swal2-deny { background-color: #ff4d4d !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h2>Settings</h2>
        </div>

        <div class="settings-list">
            
            <div class="setting-item">
                <div class="left-content">
                    <i class="fa-solid fa-bell"></i>
                    <span>Notifications</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked id="notiToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <a href="about.html" class="setting-item">
                <div class="left-content">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>About Us</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-right"></i>
            </a>

            <a href="change-password.html" class="setting-item">
                <div class="left-content">
                    <i class="fa-solid fa-lock"></i>
                    <span>Change Password</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-right"></i>
            </a>

            <div class="setting-item" onclick="handleLogout()">
                <div class="left-content">
                    <i class="fa-solid fa-right-from-bracket logout-text"></i>
                    <span class="logout-text">Log Out</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-right"></i>
            </div>

        </div>

        <div class="delete-container">
            <button class="delete-btn" onclick="handleDeleteAccount()">Delete Account</button>
        </div>
    </div>

    <script>
        // Professional Logout without localhost text
        function handleLogout() {
            Swal.fire({
                title: 'Are you sure?',
                text: "Do you want to log out?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#6c4ab6',
                cancelButtonColor: '#333',
                confirmButtonText: 'Yes, Logout',
                background: '#1a1a1a',
                color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "auth.html";
                }
            });
        }

        // Professional Delete Account with custom input
        function handleDeleteAccount() {
            Swal.fire({
                title: 'Delete Account?',
                text: "To confirm, please type 'DELETE':",
                input: 'text',
                inputPlaceholder: 'Type DELETE here...',
                showCancelButton: true,
                confirmButtonColor: '#ff4d4d',
                cancelButtonColor: '#333',
                confirmButtonText: 'Confirm Delete',
                background: '#1a1a1a',
                color: '#fff',
                preConfirm: (value) => {
                    if (value !== 'DELETE') {
                        Swal.showValidationMessage('Please type DELETE correctly');
                    }
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: 'Requested!',
                        text: 'Account deletion request submitted.',
                        icon: 'success',
                        background: '#1a1a1a',
                        color: '#fff'
                    });
                }
            });
        }

        document.getElementById('notiToggle').addEventListener('change', function() {
            if(this.checked) {
                console.log("Notifications Enabled");
            } else {
                console.log("Notifications Disabled");
            }
        });
    </script>

</body>
</html>
