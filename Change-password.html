<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Change Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* तपाईँको अघिल्लो डिजाइन जस्ताको तस्तै राखिएको छ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            padding: 0 20px 30px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .back-btn {
            color: #ffffff;
            font-size: 18px;
            text-decoration: none;
            width: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .header h2 {
            flex: 1;
            font-size: 20px;
            font-weight: 500;
            text-align: center;
            margin-right: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .input-wrapper {
            position: relative;
            background-color: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #222;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            padding: 0 15px;
            color: #555;
            font-size: 16px;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            color: #fff;
            padding: 15px 0;
            width: 100%;
            font-size: 16px;
            outline: none;
        }

        .update-btn {
            background-color: #6c4ab6; 
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }

        .update-btn:active {
            opacity: 0.8;
        }

        .swal2-popup {
            background: #1a1a1a !important;
            color: #fff !important;
            border-radius: 15px !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="setting.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h2>Change Password</h2>
        </div>

        <div class="form-group">
            <label>Current Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="oldPass" placeholder="Enter current password">
            </div>
        </div>

        <div class="form-group">
            <label>New Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="newPass" placeholder="Enter new password">
            </div>
        </div>

        <div class="form-group">
            <label>Confirm New Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-shield-lock"></i>
                <input type="password" id="confirmPass" placeholder="Repeat new password">
            </div>
        </div>

        <button class="update-btn" onclick="validatePassword()">Update Password</button>
    </div>

    <script>
        function validatePassword() {
            const oldP = document.getElementById('oldPass').value;
            const newP = document.getElementById('newPass').value;
            const confirmP = document.getElementById('confirmPass').value;

            const swalSmall = {
                width: '300px',
                padding: '1.2rem',
                confirmButtonColor: '#6c4ab6',
                background: '#1a1a1a',
                color: '#fff'
            };

            if (!oldP || !newP || !confirmP) {
                Swal.fire({
                    ...swalSmall,
                    icon: 'error',
                    title: 'Empty Fields!',
                    text: 'Please fill all fields.'
                });
                return;
            }

            if (newP !== confirmP) {
                Swal.fire({
                    ...swalSmall,
                    icon: 'error',
                    title: 'Mismatch!',
                    text: 'Passwords do not match.'
                });
                return;
            }

            if (newP.length < 6) {
                Swal.fire({
                    ...swalSmall,
                    icon: 'warning',
                    title: 'Too Short!',
                    text: 'Use at least 6 characters.'
                });
                return;
            }

            Swal.fire({
                ...swalSmall,
                icon: 'success',
                title: 'Success!',
                text: 'Password updated.'
            }).then(() => {
                // यहाँ पनि सफलता पूर्वक पासवर्ड परिवर्तन भएपछि सेटिङमा जान्छ
                window.location.href = "setting.html";
            });
        }
    </script>
</body>
</html>
